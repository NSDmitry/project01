version: "3.3"

services:
  db:
    image: postgres:latest
    container_name: project1_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123123
      POSTGRES_DB: database
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U database"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: nsdmitrij/project01:latest
    container_name: project1_migrate
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    working_dir: /app
    command: alembic upgrade head

  app:
    image: nsdmitrij/project01:latest
    container_name: project1_app
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    working_dir: /app

  cleanup:
    image: nsdmitrij/project01:latest
    container_name: project1_cleanup
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    working_dir: /app
    command: >
      sh -c "while true; do
               now=$$(date +%s);
               next=$$(date -d 'today 03:00' +%s);
               [ $$next -le $$now ] && next=$$(date -d 'tomorrow 03:00' +%s);
               sleep $$((next - now));
               python -m app.tasks.cleanup_sessions;
             done"

volumes:
  postgres_data: